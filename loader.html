<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            background: transparent;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        .toast {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(14, 14, 16, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 12px;
            padding: 10px 16px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.75),
                0 0 0 0.5px rgba(0, 0, 0, 0.6),
                0 0 20px rgba(59, 130, 246, 0.12);
            color: rgba(255, 255, 255, 0.88);
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            transition: border-color 0.2s;
            animation: fadeIn 0.12s ease-out both;
        }

        .toast.done {
            border-color: rgba(16, 185, 129, 0.35);
        }

        .toast.error {
            border-color: rgba(239, 68, 68, 0.35);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #3b82f6;
            animation: pulse 1s ease-in-out infinite;
            transition: background 0.2s;
        }

        .toast.done .dot {
            background: #10b981;
            animation: none;
        }

        .toast.error .dot {
            background: #ef4444;
            animation: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.3;
                transform: scale(0.6);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(3px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="toast" id="toast">
        <span class="dot"></span>
        <span id="label">Working…</span>
    </div>

    <script type="module" src="/src/loader.ts"></script>
</body>

</html>
